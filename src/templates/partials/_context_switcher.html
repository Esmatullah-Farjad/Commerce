{% load i18n %}

{% if context_all_branch_options and can_switch_context %}
<form
  method="post"
  action="{% url 'switch-context' %}"
  data-context-switcher
  class="{% if compact %}flex items-center gap-2{% else %}flex flex-wrap items-center gap-2{% endif %}"
>
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.get_full_path }}">

  <div class="{% if compact %}min-w-[12rem]{% endif %}">
    {% if compact %}
    <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">
      {% trans "Branch" %}
    </span>
    {% else %}
    <span class="text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">
      {% trans "Branch" %}
    </span>
    {% endif %}
    <select
      name="branch_id"
      data-context-branch
      data-selected="{{ context_selected_branch_id|default:'' }}"
      class="{% if compact %}min-w-[11rem] rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs text-slate-700{% else %}min-w-[15rem] rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 shadow-sm focus:border-teal-600 focus:ring-2 focus:ring-teal-200{% endif %}"
    >
      {% for branch in context_all_branch_options %}
      <option
        value="{{ branch.id }}"
        {% if branch.id == context_selected_branch_id %}selected{% endif %}
      >
        {{ branch.name }}
      </option>
      {% endfor %}
    </select>
  </div>

  <button
    type="submit"
    class="{% if compact %}rounded-lg bg-slate-900 px-3 py-1 text-xs font-semibold text-white hover:bg-slate-800{% else %}inline-flex items-center justify-center rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2{% endif %}"
  >
    {% trans "Switch" %}
  </button>
</form>
{% endif %}
